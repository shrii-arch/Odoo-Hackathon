<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. AUTHENTICATION SECTION -->
    <div id="auth-container" class="container">
        <h2>Welcome to HRMS Portal</h2>
        
        <!-- Toggle Buttons -->
        <div class="toggle-buttons">
            <button onclick="showAuthForm('login')">Sign In</button>
            <button onclick="showAuthForm('register')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="handleLogin(event)">
            <h3>Sign In</h3>
            <input type="email" id="login-email" placeholder="Email Address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" onsubmit="handleRegister(event)" style="display: none;">
            <h3>Sign Up</h3>
            <input type="text" id="reg-id" placeholder="Employee ID" required>
            <input type="email" id="reg-email" placeholder="Email Address" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <select id="reg-role" required>
                <option value="Employee">Employee</option>
                <option value="Admin">HR Officer / Admin</option>
            </select>
            <button type="submit">Register</button>
        </form>
    </div>

    <!-- 2. EMPLOYEE DASHBOARD -->
    <div id="employee-container" class="container" style="display: none;">
        <div class="header">
            <h2>Employee Portal</h2>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
        <p>Welcome back, <span id="emp-welcome-name">Employee</span>!</p>
        <!-- Rest of features will go here -->
    </div>

    <!-- 3. ADMIN DASHBOARD -->
    <div id="admin-container" class="container" style="display: none;">
        <div class="header">
            <h2>Admin / HR Control Center</h2>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
        <p>Welcome back, Administrator.</p>
        <!-- Rest of features will go here -->
    </div>

    <script src="script.js"></script>
</body>
</html>
